server:
  port: 8081

spring:
  application:
    name: payment-ingestor
  datasource:
    url: jdbc:h2:mem:paymentdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: localhost:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Durability: Ensures all replicas acknowledge the write, preventing data loss
      acks: all
      retries: 3
      properties:
        # Idempotence: Prevents duplicate messages in case of retries, crucial for payment integrity
        enable.idempotence: true
        # Batching efficiency: Waits up to 10ms to group multiple messages into a single request, increasing throughput
        linger.ms: 10
        # Efficiency: Larger batch size (64KB) reduces the number of network requests for 1M+ daily transactions
        batch.size: 65536
        # Optimization: Snappy compression reduces network bandwidth usage without high CPU overhead
        compression.type: snappy

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
